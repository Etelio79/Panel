<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios - Crear Usuario</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Contenedor de Login (común en ambos HTML) -->
  <div id="login-container">
    <form id="admin-login-form">
      <input type="email" id="admin-login-email" placeholder="Correo electrónico" required>
      <input type="password" id="admin-login-password" placeholder="Contraseña" required>
      <button type="submit">Iniciar sesión</button>
    </form>
    <p id="login-error" class="error-message hidden">Error: Verifique sus credenciales.</p>
  </div>

  <!-- Contenedor de gestión (solo componentes de crear usuario) -->
  <div id="user-management-container" class="hidden">
    <header>
      <!-- Navegación de la primera imagen -->
      <nav>
        <ul class="nav-links">
          <li><a href="canales.html">CANALES</a></li>
          <li><a href="peliculas.html">PELICULAS</a></li>
          <li><a href="series.html">SERIES</a></li>
          <li><a href="publicidad.html">PUBLICIDAD</a></li>
          <li><a href="lista_usuarios.html">LISTA DE USUARIOS</a></li>
        </ul>
      </nav>
      <button id="logout-btn">Cerrar Sección</button>
    </header>

    <!-- Formulario de crear usuario -->
    <section>
      <h1>CREAR USUARIO</h1>
      <form id="add-user-form">
        <input type="text" id="new-username" placeholder="Nombre de usuario" required>
        <input type="email" id="new-email" placeholder="Correo electrónico" required>
        <input type="password" id="new-password" placeholder="Contraseña" required>
        <input type="date" id="expiration-date" placeholder="Fecha de Expiración" required>
        <button type="submit">Crear Usuario</button>
      </form>
    </section>
  </div>

  <!-- Scripts Firebase y lógica común -->
  <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
